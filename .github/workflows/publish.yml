# This is a basic workflow to help you get started with Actions
name: My build action requiring more space
on: 
  workflow_dispatch: # Fixed typo: 'worlflow_dispatch' -> 'workflow_dispatch'

jobs:
  build:
    name: Build my artifact
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build
        env: 
          URL: ${{ secrets.TESTFILE_URL }}
        run: |
          set -euo pipefail
          curl -fL \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
          -H "Referer: https://gofile.io/" \
          -H "Accept: */*" \
          "$URL" \
          | zstd -19 > bigthing.zst
          ls -lh bigthing.zst
      - name: Create Release and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Deletes the 'latest' tag/release if it exists so we can overwrite it
          gh release delete latest --yes || true
          git tag -d latest || true
          
          # Creates a new release and uploads your .zst file directly
          gh release create latest bigthing.zst \
            --title "Latest Build" \
            --notes "Automatic build from GitHub Actions"
